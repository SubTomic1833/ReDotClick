<!DOCTYPE html>
<html>
    <head>
        <title>ReDotClick</title>
        <style>
            body{
                background-color:#222;
                color:white;
                font-family:sans-serif;
                text-align:center;
                margin:0;
                overflow:hidden;
            }
            #ui{
                margin-top:10px;
                font-size:20px;
            }
            canvas{
                background-color:#eee;
                display:block;
                margin:20px auto;
                border:2px solid black;
            }
        </style>
    </head>
    <body>
        <div id="ui">
            Score:<span id="scoreLabel">0</span> |
            Lives:<span id="livesLabel">3</span>
        </div>
        <canvas id="myCanvas" width="800" height="600"></canvas>
        <script>
            var canvas=document.getElementById("myCanvas");
            var ctx=canvas.getContext("2d");
            var scoreLabel=document.getElementById("scoreLabel");
            var livesLabel=document.getElementById("livesLabel");
            var score=0;
            var lives=3;
            var gameOver=false;
            var targetX=400;
            var targetY=300;
            var targetRadius=30;
            var spawnTimer;
            var timerSpeed=1500;
            var gameState="start";
            document.getElementById("ui").style.display="none";

            function moveTarget(){
                targetX=Math.random()*(canvas.width-100)+50;
                targetY=Math.random()*(canvas.height-100)+50;
            }
            function drawGame(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if(gameState=="start"){
                    ctx.fillStyle="#222";
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle="white";
                    ctx.font="60px Arial";
                    ctx.textAlign="center";
                    ctx.fillText("ReDotClick",400,150);
                    ctx.font="24px Arial";
                    ctx.fillText("Click the red dot before the time runs out!", 400,220);
                    ctx.fillStyle="red";
                    ctx.fillRect(300,320,200,70);
                    ctx.fillStyle="white";
                    ctx.font="32px Arial";
                    ctx.fillText("START",400,365);
                    return;
                }
                if(gameState=="levels"){
                    ctx.fillStyle="#222";
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle="white";
                    ctx.textAlign="center";
                    ctx.font="50px Arial";
                    ctx.fillText("Select a Level", 400,100);
                    ctx.fillStyle="red";
                    ctx.fillRect(250,180,300,60);
                    ctx.fillStyle="white";
                    ctx.font="30px Arial";
                    ctx.fillText("LEVEL 1",400,220);

                    ctx.fillStyle="orange";
                    ctx.fillRect(250,280,300,60);
                    ctx.fillStyle="white";
                    ctx.fillText("LEVEL 2",400,320);

                    ctx.fillStyle="purple";
                    ctx.fillRect(250,380,300,60);
                    ctx.fillStyle="white";
                    ctx.fillText("LEVEL 3",400,420);
                    return;
                }
                if(gameState=="playing"){
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle="red";
                    ctx.beginPath();
                    ctx.arc(targetX,targetY,targetRadius,0,Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle="black";
                    ctx.lineWidth=3;
                    ctx.stroke();
                }
                if(gameState=="gameover"){
                    ctx.fillStyle="#eee";
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle="black";
                    ctx.font="40px Arial";
                    ctx.textAlign="center";
                    ctx.fillText("GAME OVER",400,280);
                    ctx.font="20px Arial";
                    ctx.fillText("Refresh page to try again!", 400,330);
                    return;
                }
            }
            function onTimerTick(){
                lives=lives-1;
                livesLabel.innerText=lives;
                if(lives<=0){
                    endTheGame();
                }else{
                    moveTarget();
                    drawGame();
                }
            }
            function startTimer(){
                clearInterval(spawnTimer);
                spawnTimer=setInterval(onTimerTick, timerSpeed);
            }
            function endTheGame(){
                gameOver=true;
                gameState="gameover";
                clearInterval(spawnTimer);
                drawGame();
            }
            canvas.addEventListener("mousedown", function(event){
                if(gameOver==true) return;

                var rect=canvas.getBoundingClientRect();
                var mouseX=event.clientX-rect.left;
                var mouseY=event.clientY-rect.top;
                if(gameState=="start"){
                    if(mouseX>=300 && mouseX<=500 && mouseY>=320 && mouseY <= 390){
                        gameState="levels";
                        drawGame();
                    }
                    return;
                }
                if(gameState=="levels"){
                    if(mouseX>=250 && mouseX<=550 && mouseY>=180 && mouseY <= 240){
                        gameState="playing";
                        document.getElementById("ui").style.display="block";
                        moveTarget();
                        startTimer();
                        drawGame();
                    }
                    return;
                }
                var dx=mouseX-targetX;
                var dy=mouseY-targetY;
                var distance= Math.sqrt(dx*dx+dy*dy);

                if(distance<=targetRadius){
                    score=score+1;
                    scoreLabel.innerText=score;

                    if(timerSpeed>600){
                        timerSpeed=timerSpeed-50;
                    }
                    moveTarget();
                    startTimer();
                    drawGame();
                }else{
                    lives=lives-1;
                    livesLabel.innerText=lives;

                    if(lives<= 0){
                        endTheGame();
                    }else{
                        moveTarget();
                        startTimer();
                        drawGame();
                    }
                }
            });
            drawGame();
        </script>
    </body>
</html>
